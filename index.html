<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>您的穿搭哲學，我們也想學！</title>
<meta name="description" content="只要 1 分鐘！分享您的穿搭習慣與喜好，幫助我們規劃更好的服飾 🙏">
<meta property="og:title" content="您的穿搭哲學，我們也想學！">
<meta property="og:description" content="只要 1 分鐘！分享您的穿搭習慣與喜好，幫助我們規劃更好的服飾 🙏">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAF8F5;
    --card: #FFFFFF;
    --ink: #1A1714;
    --ink-soft: #5C5753;
    --ink-faint: #9E9A96;
    --accent: #C4703A;
    --accent-light: #F5E8DC;
    --accent-dark: #9E5328;
    --border: #E8E3DC;
    --border-focus: #C4703A;
    --shadow: 0 2px 16px rgba(26,23,20,0.07);
    --shadow-lg: 0 8px 40px rgba(26,23,20,0.12);
    --radius: 12px;
    --radius-sm: 8px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 40px 16px 80px;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(196,112,58,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .header {
    text-align: center;
    margin-bottom: 20px;
    padding: 28px 24px 24px;
    background: var(--card);
    border-radius: 16px;
    box-shadow: var(--shadow-lg);
    border-top: 4px solid var(--accent);
    position: relative;
    overflow: hidden;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent-light), transparent);
  }
  .header h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: .02em;
    margin-bottom: 8px;
  }
  .header p {
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.6;
    font-weight: 300;
  }
  .header-badge {
    display: inline-block;
    margin-top: 12px;
    padding: 4px 12px;
    background: var(--accent-light);
    color: var(--accent-dark);
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .04em;
  }

  .section {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    overflow: hidden;
    transition: box-shadow .2s;
  }
  .section:hover { box-shadow: var(--shadow-lg); }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 18px 24px 16px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, #FDFCFB 0%, var(--bg) 100%);
  }
  .section-num {
    width: 28px; height: 28px;
    background: var(--accent);
    color: #fff;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .section-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: .04em;
  }

  .section-body { padding: 24px; }

  .question-group { margin-bottom: 28px; }
  .question-group:last-child { margin-bottom: 0; }

  .question-label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 12px;
    line-height: 1.5;
  }
  .question-hint {
    display: block;
    font-size: 12px;
    color: var(--ink-faint);
    font-weight: 300;
    margin-top: 3px;
  }

  .text-input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    color: var(--ink);
    background: var(--bg);
    transition: border-color .2s, box-shadow .2s;
    outline: none;
  }
  .text-input:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(196,112,58,0.12);
    background: #fff;
  }
  .text-input::placeholder { color: var(--ink-faint); }
  textarea.text-input { resize: vertical; min-height: 100px; line-height: 1.6; }

  .pills { display: flex; flex-wrap: wrap; gap: 8px; }
  .pill {
    padding: 8px 16px;
    border: 1.5px solid var(--border);
    border-radius: 100px;
    background: var(--bg);
    color: var(--ink-soft);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    font-weight: 400;
    cursor: pointer;
    transition: all .18s;
    user-select: none;
    line-height: 1;
  }
  .pill:hover { border-color: var(--accent); color: var(--accent-dark); background: var(--accent-light); }
  .pill.selected { border-color: var(--accent); background: var(--accent); color: #fff; font-weight: 500; }

  .age-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }
  @media (max-width: 480px) { .age-grid { grid-template-columns: repeat(3, 1fr); } }
  .age-pill {
    padding: 9px 4px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg);
    color: var(--ink-soft);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 12px;
    font-weight: 400;
    cursor: pointer;
    text-align: center;
    transition: all .18s;
    user-select: none;
  }
  .age-pill:hover { border-color: var(--accent); color: var(--accent-dark); background: var(--accent-light); }
  .age-pill.selected { border-color: var(--accent); background: var(--accent); color: #fff; font-weight: 500; }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 28px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent-light), var(--accent)); border-radius: 2px; transition: width .3s; width: 0%; }

  .submit-wrap { padding: 32px 24px; text-align: center; }
  .btn-submit {
    display: inline-block;
    padding: 16px 56px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 100px;
    font-family: 'Noto Serif TC', serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: .06em;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(196,112,58,0.35);
    transition: all .2s;
  }
  .btn-submit:hover { background: var(--accent-dark); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(196,112,58,0.4); }
  .btn-submit:active { transform: translateY(0); }
  .submit-note { margin-top: 14px; font-size: 12px; color: var(--ink-faint); }

  .success-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(250,248,245,0.96);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    padding: 32px;
  }
  .success-overlay.show { display: flex; }
  .success-icon { font-size: 56px; margin-bottom: 20px; }
  .success-overlay h2 { font-family: 'Noto Serif TC', serif; font-size: 24px; color: var(--ink); margin-bottom: 10px; }
  .success-overlay p { font-size: 14px; color: var(--ink-soft); line-height: 1.7; }
</style>
</head>
<body>

<div class="container">

  <!-- Header -->

          </div>

        </div>

        <div class="question-group">
          <label class="question-label">Q2．您的年齡區間？</label>
          <div class="age-grid">
            <button type="button" class="age-pill" data-group="age" data-value="未滿20歲">未滿20歲</button>
            <button type="button" class="age-pill" data-group="age" data-value="20-24歲">20–24歲</button>
            <button type="button" class="age-pill" data-group="age" data-value="25-29歲">25–29歲</button>
            <button type="button" class="age-pill" data-group="age" data-value="30-34歲">30–34歲</button>
            <button type="button" class="age-pill" data-group="age" data-value="35-39歲">35–39歲</button>
            <button type="button" class="age-pill" data-group="age" data-value="40-44歲">40–44歲</button>
            <button type="button" class="age-pill" data-group="age" data-value="45-49歲">45–49歲</button>
            <button type="button" class="age-pill" data-group="age" data-value="50-54歲">50–54歲</button>
            <button type="button" class="age-pill" data-group="age" data-value="55-59歲">55–59歲</button>
            <button type="button" class="age-pill" data-group="age" data-value="60-64歲">60–64歲</button>
            <button type="button" class="age-pill" data-group="age" data-value="65歲以上">65歲以上</button>

          <input type="hidden" name="age" id="age-hidden">

        <div class="question-group">
          <label class="question-label">Q3．您目前的職業狀態？</label>
          <div class="pills">
            <button type="button" class="pill" data-group="occupation" data-single="true" data-value="全職上班">全職上班</button>
            <button type="button" class="pill" data-group="occupation" data-single="true" data-value="在校學生">在校學生</button>
            <button type="button" class="pill" data-group="occupation" data-single="true" data-value="自由接案">自由接案</button>
            <button type="button" class="pill" data-group="occupation" data-single="true" data-value="家庭主婦">家庭主婦</button>
            <button type="button" class="pill" data-group="occupation" data-single="true" data-value="兼職打工">兼職打工</button>
            <button type="button" class="pill" data-group="occupation" data-single="true" data-value="自行創業">自行創業</button>
            <button type="button" class="pill" data-group="occupation" data-single="true" data-value="目前待業">目前待業</button>
            <button type="button" class="pill" data-group="occupation" data-single="true" data-value="已經退休">已經退休</button>
          </div>
          <input type="hidden" name="occupation" id="occupation-hidden">
        </div>

      </div>
    </div>

    <!-- 02 購物習慣 -->
    <div class="section">
      <div class="section-header">
        <div class="section-num">02</div>
        <span class="section-title">購物習慣</span>
      </div>
      <div class="section-body">

        <div class="question-group">
          <label class="question-label">Q4．您平均每月購買服飾的頻率？</label>
          <div class="pills">
            <button type="button" class="pill" data-group="frequency" data-single="true" data-value="2件以內">2 件以內</button>
            <button type="button" class="pill" data-group="frequency" data-single="true" data-value="3-5件">3–5 件</button>

            <button type="button" class="pill" data-group="budget" data-single="true" data-value="$3000-4000">$3,000–4,000</button>
            <button type="button" class="pill" data-group="budget" data-single="true" data-value="$4000-5000">$4,000–5,000</button>
            <button type="button" class="pill" data-group="budget" data-single="true" data-value="$5000以上">$5,000 以上</button>

        <div class="question-group">

            <button type="button" class="pill" data-group="channel" data-value="二手平台">二手平台</button>

        <div class="question-group">
          <label class="question-label">Q7．您通常如何發現新的服飾品牌？<span class="question-hint">可多選</span></label>
          <div class="pills">
            <button type="button" class="pill" data-group="discovery" data-value="蝦皮搜尋">蝦皮搜尋</button>
            <button type="button" class="pill" data-group="discovery" data-value="蝦皮廣告">蝦皮廣告</button>
            <button type="button" class="pill" data-group="discovery" data-value="社群廣告">社群廣告</button>
            <button type="button" class="pill" data-group="discovery" data-value="社群貼文">社群貼文</button>
            <button type="button" class="pill" data-group="discovery" data-value="網路搜尋">網路搜尋</button>
            <button type="button" class="pill" data-group="discovery" data-value="網紅推薦">網紅推薦</button>
            <button type="button" class="pill" data-group="discovery" data-value="親友推薦">親友推薦</button>
            <button type="button" class="pill" data-group="discovery" data-value="老客回購">老客回購</button>
            <button type="button" class="pill" data-group="discovery" data-value="實體活動">實體活動</button>
          </div>
        </div>

      </div>
    </div>

    <!-- 03 風格與偏好 -->
    <div class="section">
      <div class="section-header">
        <div class="section-num">03</div>
        <span class="section-title">穿搭偏好</span>
      </div>
      <div class="section-body">

        <div class="question-group">
          <label class="question-label">Q8．您購買服飾時最在意什麼？<span class="question-hint">可多選</span></label>

            <button type="button" class="pill" data-group="priority" data-value="版型設計">版型設計</button>

<script>
  // Single-select pills
  document.querySelectorAll('.pill[data-single="true"]').forEach(pill => {
    pill.addEventListener('click', () => {
      const group = pill.dataset.group;
      document.querySelectorAll(`.pill[data-group="${group}"]`).forEach(p => p.classList.remove('selected'));
      pill.classList.add('selected');
      const hidden = document.getElementById(`${group}-hidden`);
      if (hidden) hidden.value = pill.dataset.value;
      updateProgress();
    });
  });

  // Multi-select pills
  document.querySelectorAll('.pill:not([data-single])').forEach(pill => {
    pill.addEventListener('click', () => {
      pill.classList.toggle('selected');
      updateProgress();
    });
  });

  // Age pills
  document.querySelectorAll('.age-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.age-pill').forEach(p => p.classList.remove('selected'));
      pill.classList.add('selected');
      document.getElementById('age-hidden').value = pill.dataset.value;
      updateProgress();
    });
  });

  // Progress
  function updateProgress() {
    const totalGroups = 7;
    let answered = 0;
    const checkGroups = ['gender','age','occupation','budget','max_price','frequency'];
    checkGroups.forEach(g => {
      const el = document.getElementById(`${g}-hidden`);
      if (el && el.value) answered++;
    });
    const pct = Math.round((answered / totalGroups) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
  }

  // Submit
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzMwRct7Wwed70_Gpz1XJS3wB0cKO1RhqU28QVIBuIERN-r8EC-9TenlQ4-41gA3iuF_w/exec';

  document.getElementById('surveyForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    // Validate required fields
    const requiredSingle = ['gender','age','occupation','budget','frequency'];
    const requiredMulti = ['channel','discovery','priority','style','items'];
    let missing = [];

    requiredSingle.forEach(g => {
      const el = document.getElementById(`${g}-hidden`);
      if (!el || !el.value) missing.push(g);
    });
    requiredMulti.forEach(g => {
      const selected = document.querySelectorAll(`.pill[data-group="${g}"].selected`);
      if (selected.length === 0) missing.push(g);
    });

    if (missing.length > 0) {
      alert('請填寫所有必填題目後再送出！');
      return;
    }

    // 必答驗證
    const required = [
      { id: 'gender-hidden', label: 'Q1 性別' },
      { id: 'age-hidden', label: 'Q2 年齡區間' },
      { id: 'occupation-hidden', label: 'Q3 職業狀態' },
      { id: 'frequency-hidden', label: 'Q4 購買頻率' },
      { id: 'budget-hidden', label: 'Q5 每月預算' },
    ];
    const requiredMulti = [
      { group: 'channel', label: 'Q6 購物平台' },
      { group: 'discovery', label: 'Q7 發現品牌' },
      { group: 'priority', label: 'Q8 購買在意' },
      { group: 'style', label: 'Q9 穿搭風格' },
      { group: 'items', label: 'Q10 常買單品' },
    ];

    for (const f of required) {
      const el = document.getElementById(f.id);
      if (!el || !el.value) {
        alert(`請回答：${f.label}`);
        return;
      }
    }
    for (const f of requiredMulti) {
      const selected = document.querySelectorAll(`.pill[data-group="${f.group}"].selected`);
      if (selected.length === 0) {
        alert(`請回答：${f.label}`);
        return;
      }
    }

    const btn = document.querySelector('.btn-submit');
    btn.textContent = '送出中…';
    btn.disabled = true;

    const getMulti = (group) => [...document.querySelectorAll(`.pill[data-group="${group}"].selected`)]
      .map(p => p.dataset.value).join('、');

    const headers = ['時間戳記','性別','年齡區間','職業狀態','購買頻率','每月預算','購物平台','發現品牌','購買在意','穿搭風格','常買單品','其他意見'];
    const values = [
      new Date().toLocaleString('zh-TW'),
      document.getElementById('gender-hidden').value,
      document.getElementById('age-hidden').value,
      document.getElementById('occupation-hidden').value,
      document.getElementById('frequency-hidden').value,
      document.getElementById('budget-hidden').value,
      getMulti('channel'),
      getMulti('discovery'),
      getMulti('priority'),
      getMulti('style'),
      getMulti('items'),
      document.querySelector('[name="comments"]').value.trim(),
    ];

    const params = new URLSearchParams();
    headers.forEach((h, i) => params.append(h, values[i]));
    params.append('json', JSON.stringify(headers.map((h, i) => ({ key: h, val: values[i] }))));

    try {
      await fetch(SCRIPT_URL + '?' + params.toString(), { method: 'GET', mode: 'no-cors' });
      document.getElementById('successOverlay').classList.add('show');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } catch (err) {
      btn.textContent = '送出失敗，請再試一次';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
